<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ffd60a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Dark background square with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#050814"/>

  <!-- Subtle glow circle -->
  <circle cx="256" cy="230" r="180" fill="rgba(139,92,246,0.08)"/>
  <circle cx="300" cy="200" r="130" fill="rgba(0,212,255,0.06)"/>

  <!-- Hexagon border -->
  <polygon
    points="256,60 330,103 330,189 256,232 182,189 182,103"
    fill="rgba(255,255,255,0.05)"
    stroke="url(#g1)"
    stroke-width="3"
  />

  <!-- C arc for "Calc" -->
  <path
    d="M280,115 A52,52 0 1,0 280,225"
    fill="none"
    stroke="url(#g1)"
    stroke-width="10"
    stroke-linecap="round"
  />

  <!-- Nova spark lines -->
  <line x1="288" y1="128" x2="312" y2="112" stroke="#ffd60a" stroke-width="6" stroke-linecap="round"/>
  <line x1="296" y1="170" x2="322" y2="170" stroke="#ffd60a" stroke-width="6" stroke-linecap="round"/>
  <line x1="288" y1="212" x2="312" y2="228" stroke="#ffd60a" stroke-width="6" stroke-linecap="round"/>

  <!-- CALCNOVA text -->
  <text
    x="256" y="308"
    text-anchor="middle"
    font-family="'Orbitron','SF Pro Display',Arial Black,sans-serif"
    font-size="62"
    font-weight="900"
    letter-spacing="4"
    fill="#eef2ff"
  >CALC</text>

  <text
    x="256" y="374"
    text-anchor="middle"
    font-family="'Orbitron','SF Pro Display',Arial Black,sans-serif"
    font-size="62"
    font-weight="900"
    letter-spacing="4"
    fill="url(#g2)"
  >NOVA</text>

  <!-- Tagline -->
  <text
    x="256" y="420"
    text-anchor="middle"
    font-family="Arial,sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="5"
    fill="rgba(155,168,192,0.7)"
  >CALCULATORS</text>

  <!-- Bottom gradient line -->
  <rect x="96" y="450" width="320" height="3" rx="2" fill="url(#g1)" opacity="0.6"/>
</svg>
